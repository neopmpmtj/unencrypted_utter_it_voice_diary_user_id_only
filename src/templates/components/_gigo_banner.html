{% load i18n %}
{% comment %}
GIGO Monitor nudge banner.
Shown when user has 3+ consecutive low-quality entries (<=7 words).
{% endcomment %}

{% if gigo_alert_pending %}
<div id="gigo-banner"
     class="bg-amber-100 dark:bg-amber-900/30 border-b border-amber-300 dark:border-amber-700 text-amber-900 dark:text-amber-100 px-4 py-2 flex items-center justify-between gap-4"
     role="alert">
  <span class="text-sm">
    <strong>{% trans "GIGO monitor:" %}</strong>
    {% trans "Your entries are not good quality." %}
  </span>
  <button type="button"
          id="gigo-dismiss-btn"
          class="shrink-0 text-amber-700 dark:text-amber-300 hover:text-amber-900 dark:hover:text-amber-100 transition-colors px-2 py-1 rounded"
          aria-label="{% trans 'Dismiss' %}">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</div>
<script>
(function(){
  var btn = document.getElementById('gigo-dismiss-btn');
  var banner = document.getElementById('gigo-banner');
  if (!btn || !banner) return;
  btn.addEventListener('click', function(){
    var csrf = document.querySelector('[name=csrfmiddlewaretoken]');
    if (!csrf) return;
    fetch('/api/gigo/dismiss/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': csrf.value,
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      credentials: 'same-origin',
      body: JSON.stringify({})
    }).then(function(r){ return r.json(); }).then(function(){
      banner.remove();
    }).catch(function(){ banner.remove(); });
  });
})();
</script>
{% endif %}
